version: '3.8'

services:
  xiaoai-home-assistant:
    image: xiaoai-home-assistant:latest
    container_name: xiaoai-ha-bridge
    restart: unless-stopped
    ports:
      - "18015:18015"
    volumes:
      - xiaoai-config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18015/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  xiaoai-config:
